<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>في انتظار بداية المباراة...</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            background-color: #05070a;
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* خلفية فخمة بلمسات زرقاء سماوية (ألوان الأرجنتين) */
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(116, 172, 223, 0.15), transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(255, 255, 255, 0.05), transparent 50%);
            overflow: hidden;
        }

        .waiting-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(116, 172, 223, 0.15);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            position: relative;
        }

        /* تأثير النبض الدائري خلف الأيقونة */
        .pulse-ring {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
        }

        .pulse-ring::before, .pulse-ring::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 50%;
            border: 2px solid #74acdf;
            animation: ripple 2s linear infinite;
        }

        .pulse-ring::after {
            animation-delay: 1s;
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* أيقونة الساعة / الانتظار */
        .icon-circle {
            position: relative;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #74acdf, #2AABEE);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(116, 172, 223, 0.4);
            z-index: 2;
        }

        .icon-circle svg {
            width: 50px;
            height: 50px;
            fill: #ffffff;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0 0 15px 0;
            background: linear-gradient(135deg, #ffffff, #74acdf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1rem;
            color: #a0aab2;
            margin: 0 0 30px 0;
            line-height: 1.6;
            font-weight: 700;
        }

        .highlight {
            color: #ffffff;
            background: rgba(116, 172, 223, 0.2);
            padding: 4px 12px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 10px;
            border: 1px solid rgba(116, 172, 223, 0.3);
        }

        .footer {
            margin-top: 10px;
        }

        .tg-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2AABEE 0%, #229ED9 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 16px 35px;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 900;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(42, 171, 238, 0.3);
        }

        .tg-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(42, 171, 238, 0.5);
        }

        .tg-btn svg {
            width: 24px;
            height: 24px;
            fill: #ffffff;
            margin-left: 10px;
        }

        .channel-id {
            display: block;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #5a6b7c;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="waiting-container">
        
        <!-- الأيقونة والنبض -->
        <div class="pulse-ring">
            <div class="icon-circle">
                <!-- أيقونة ساعة رملية / وقت -->
                <svg viewBox="0 0 24 24">
                    <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
                </svg>
            </div>
        </div>

        <h1>نحن في وضع الاستعداد</h1>
        <p>
            تغطية الأسطورة لم تبدأ بعد..<br>
            <span class="highlight">سيتم عودة البث المباشر فور إطلاق صافرة البداية ⏳</span>
        </p>

        <!-- زر الانضمام للقناة كإجراء بديل أثناء الانتظار -->
        <div class="footer">
            <a href="https://t.me/messi_1" target="_blank" class="tg-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .24z"/>
                </svg>
                خليك قريب وتابعنا هنا
            </a>
            <span class="channel-id">@messi_1</span>
        </div>

    </div>

    <script>
        // توسيع شاشة التليجرام لأقصى حد
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.expand();
        }
    </script>
</body>
</html>
