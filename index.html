<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر | الأسطورة ليو ميسي</title>
    <!-- كود التحويل التلقائي بعد 3 ثوانٍ إلى رابط البث الجديد -->
    <meta http-equiv="refresh" content="3;url=https://table.houseinventer.com/pdf/AzMjD2IyADQPb2tLfQ/index.m3u8">
    
    <style>
        :root {
            --primary: #e63946;
            --gold: #f4a261;
            --telegram: #24A1DE;
            --bg: #09090b;
            --card: #18181b;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .background-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(230, 57, 70, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .main-card {
            background: var(--card);
            border: 1px solid #27272a;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            z-index: 2;
            position: relative;
        }

        .icon-container {
            width: 70px;
            height: 70px;
            background: rgba(230, 57, 70, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            border: 2px solid var(--primary);
            box-shadow: 0 0 20px rgba(230, 57, 70, 0.3);
        }

        .icon-container svg {
            width: 35px;
            height: 35px;
            fill: var(--primary);
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 15px 0;
            line-height: 1.4;
        }

        .highlight {
            color: var(--gold);
        }

        .description {
            color: #a1a1aa;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* الزر الناري للانتقال المباشر للمباراة */
        .action-button {
            display: block;
            background: linear-gradient(135deg, #e63946 0%, #ff2d55 100%);
            color: white;
            text-decoration: none;
            padding: 18px 25px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 8px 25px rgba(230, 57, 70, 0.4);
            transition: all 0.3s ease;
            margin: 25px 0;
        }

        .action-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(230, 57, 70, 0.6);
        }

        /* صندوق التليجرام */
        .telegram-section {
            background: #111113;
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 20px;
            margin-top: 25px;
            margin-bottom: 25px;
        }

        .channel-name {
            font-size: 16px;
            font-weight: bold;
            color: var(--text);
            margin-bottom: 15px;
        }

        .telegram-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: var(--telegram);
            color: white;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .telegram-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(36, 161, 222, 0.4);
        }

        .telegram-icon {
            width: 18px;
            height: 18px;
            fill: white;
        }

        /* أنيميشن التحميل */
        .loading-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #71717a;
            font-size: 15px;
            font-weight: bold;
        }

        .dots {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--gold);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* الصلاة على النبي */
        .blessing-text {
            font-size: 16px;
            color: #d4d4d8;
            border-top: 1px solid #27272a;
            padding-top: 20px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="main-card">
        
        <div class="icon-container">
            <svg viewBox="0 0 24 24">
                <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4zM14 13h-3v3H9v-3H6v-2h3V8h2v3h3v2z"/>
            </svg>
        </div>

        <h2 class="title">مرحباً بكم في <span class="highlight">الأسطورة ليو ميسي</span></h2>
        
        <p class="description">
            جاري تحويلكم الآن إلى البث المباشر.
        </p>

        <div class="loading-container">
            <span>جاري التحويل</span>
            <div class="dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- زر الانتقال اليدوي -->
        <a href="https://table.houseinventer.com/pdf/AzMjD2IyADQPb2tLfQ/index.m3u8" class="action-button">
            ⚽ اضغط هنا للبث المباشر
        </a>

        <!-- صندوق قناة التليجرام -->
        <div class="telegram-section">
            <div class="channel-name">تغطية حصرية وأهداف المباريات في قناتنا 👑</div>
            <a href="https://t.me/messi_1" class="telegram-btn" target="_blank">
                <svg class="telegram-icon" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-1-.65-.35-1 .22-1.62.15-.15 2.7-2.46 2.75-2.67.01-.03.01-.14-.06-.2-.07-.06-.17-.04-.25-.02-.11.02-1.83 1.16-5.17 3.42-.49.34-.93.5-1.33.49-.44-.01-1.29-.25-1.92-.45-.77-.25-1.39-.39-1.34-.83.03-.23.35-.46.97-.71 3.82-1.66 6.37-2.75 7.66-3.29 3.66-1.53 4.42-1.8 4.92-1.8.11 0 .35.03.51.16.13.11.17.26.19.37.02.07.03.22.01.28z"/>
                </svg>
                اشترك الآن @messi_1
            </a>
        </div>

        <div class="blessing-text">
            اللهم صل وسلم على نبينا
        </div>
    </div>

</body>
</html>
