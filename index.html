<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- إعدادات تمنع زوم الصفحة وتدعم الشاشة الكاملة -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تغطية مباريات الأرجنتين - بث مباشر</title>
    
    <!-- خطوط وتصميم -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- مكتبة مشغل Video.js العالمية -->
    <link href="https://vjs.zencdn.net/8.5.2/video-js.css" rel="stylesheet" />
    
    <!-- مكتبة تليجرام لفتح الصفحة بكامل الشاشة -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            background-color: #05070a;
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 10%, rgba(116, 172, 223, 0.1), transparent 30%),
                radial-gradient(circle at 85% 90%, rgba(212, 175, 55, 0.05), transparent 30%);
        }

        .premium-container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            margin-top: 10px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .title-wrapper h1 {
            font-size: 1.3rem;
            font-weight: 900;
            margin: 0 0 5px 0;
            background: linear-gradient(135deg, #74acdf, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-wrapper p {
            margin: 0;
            font-size: 0.85rem;
            color: #888;
        }

        .live-badge {
            display: flex;
            align-items: center;
            background: rgba(255, 59, 48, 0.15);
            border: 1px solid rgba(255, 59, 48, 0.4);
            color: #ff453a;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 900;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background: #ff453a;
            border-radius: 50%;
            margin-left: 6px;
            box-shadow: 0 0 8px #ff453a;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            100% { transform: scale(1.3); opacity: 1; }
        }

        /* تعديلات مخصصة لمشغل Video.js ليناسب الجوال */
        .video-wrapper {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #000;
        }

        .video-js {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 16/9;
        }

        .vjs-big-play-button {
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            border-radius: 50% !important;
            background-color: rgba(116, 172, 223, 0.8) !important;
            border: none !important;
            width: 3em !important;
            height: 3em !important;
            line-height: 3em !important;
        }

        .external-btn {
            display: block;
            background: #2a2a2a;
            color: #fff;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 15px;
            border: 1px solid #444;
            transition: 0.3s;
        }

        .external-btn:hover {
            background: #333;
        }

        .notice {
            text-align: center;
            font-size: 0.8rem;
            color: #777;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="premium-container">
        <div class="header">
            <div class="title-wrapper">
                <h1>تغطية الأسطورة ميسي</h1>
                <p>البث المباشر (سيرفر رئيسي)</p>
            </div>
            <div class="live-badge">
                <div class="pulse-dot"></div>
                <span>LIVE</span>
            </div>
        </div>

        <div class="video-wrapper">
            <!-- مشغل Video.js الاحترافي -->
            <video
                id="my-video"
                class="video-js vjs-default-skin vjs-big-play-centered"
                controls
                preload="auto"
                playsinline
                webkit-playsinline
                data-setup='{"fluid": true}'>
                <source src="https://stm.linkip.org/live/1957_.m3u8" type="application/x-mpegURL">
                <p class="vjs-no-js">
                    لتشغيل هذا الفيديو، يرجى تفعيل الجافا سكريبت أو استخدام متصفح يدعم HTML5.
                </p>
            </video>
        </div>

        <!-- زر احتياطي في حال كان سيرفر البث يمنع (CORS) -->
        <a href="https://stm.linkip.org/live/1957_.m3u8" class="external-btn" target="_blank">
            إذا لم يعمل المشغل، اضغط هنا لفتح البث الخارجي
        </a>
        <p class="notice">المشغل يدعم تكبير الشاشة (Full Screen) من أيقونة المربع أسفل الفيديو.</p>

    </div>

    <!-- استدعاء سكريبت Video.js -->
    <script src="https://vjs.zencdn.net/8.5.2/video.min.js"></script>
    
    <script>
        // إجبار صفحة التليجرام المصغرة (Web App) على التمدد لكامل الشاشة
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.expand();
        }

        // إعداد المشغل
        var player = videojs('my-video', {
            html5: {
                vhs: {
                    overrideNative: true // محاولة تجاوز قيود المتصفح الأصلية
                },
                nativeAudioTracks: false,
                nativeVideoTracks: false
            }
        });

        player.ready(function() {
            console.log('المشغل جاهز!');
        });
    </script>
</body>
</html>
