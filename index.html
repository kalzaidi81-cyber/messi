<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البث المباشر | الأسطورة ليو ميسي</title>
    
    <style>
        :root {
            --primary: #ff453a;
            --gold: #ffd700;
            --telegram: #24A1DE;
            --bg: #09090b;
            --card: #18181b;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background: var(--card);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .header h1 { margin: 0; font-size: 20px; }
        .header span { color: var(--gold); }

        .container {
            max-width: 950px;
            width: 95%;
            margin: 25px auto;
            text-align: center;
            flex: 1;
        }

        .channel-title {
            color: var(--gold);
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
        }

        /* حاوية الـ iframe الذكية مع تأثير التحميل */
        .video-container {
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.8);
            border: 1px solid #2d2d2d;
            position: relative;
        }

        iframe {
            display: block;
            width: 100%;
            height: 550px;
            border: none;
            background: #000;
        }

        /* أزرار التحكم بالبث الجديد */
        .controls-panel {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: var(--primary);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        /* شاشة التحويل والكسر للحماية */
        .status-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 16px;
            z-index: 10;
            background: rgba(0,0,0,0.8);
            padding: 15px 25px;
            border-radius: 8px;
            border: 1px solid #333;
            display: block;
        }

        /* قسم تليجرام */
        .telegram-section {
            background: var(--card);
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto 30px auto;
        }

        .channel-name {
            font-size: 16px;
            font-weight: bold;
            color: var(--text);
            margin-bottom: 12px;
        }

        .telegram-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: var(--telegram);
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .telegram-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(36, 161, 222, 0.4);
        }

        .telegram-icon {
            width: 18px;
            height: 18px;
            fill: white;
        }

        /* الصلاة على النبي الكريم */
        .blessing-text {
            font-size: 16px;
            color: #d4d4d8;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .footer {
            text-align: center;
            padding: 15px;
            color: #555;
            font-size: 13px;
            border-top: 1px solid #27272a;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🔥 تلبية لمطالبكم متابعي <span>قناتكم الأسطورة ليو ميسي</span> 🔥</h1>
    </div>

    <div class="container">
        
        <div class="channel-title">سيتم بث لقاء اسبانيا والبرتغال عبر البوت ⚽</div>

        <!-- حاوية الفيديو المخترقة للحماية -->
        <div class="video-container" id="iframeWrapper">
            <div id="loadingText" class="status-loading">🔄 جاري تكسير حماية السيرفر وتشغيل البث داخل موقعك...</div>
            <iframe id="liveIframe" allowfullscreen></iframe>
        </div>
        
        <!-- أزرار التحديث والتكبير -->
        <div class="controls-panel">
            <button class="btn" onclick="loadBypassedStream()">🔄 تحديث البث</button>
            <button class="btn" onclick="goFullscreen()">📺 تكبير الشاشة</button>
        </div>

        <!-- صندوق قناة التليجرام -->
        <div class="telegram-section">
            <div class="channel-name">الأسطورة ليو ميسي 👑</div>
            <a href="https://t.me/messi_1" class="telegram-btn" target="_blank">
                <svg class="telegram-icon" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-1-.65-.35-1 .22-1.62.15-.15 2.7-2.46 2.75-2.67.01-.03.01-.14-.06-.2-.07-.06-.17-.04-.25-.02-.11.02-1.83 1.16-5.17 3.42-.49.34-.93.5-1.33.49-.44-.01-1.29-.25-1.92-.45-.77-.25-1.39-.39-1.34-.83.03-.23.35-.46.97-.71 3.82-1.66 6.37-2.75 7.66-3.29 3.66-1.53 4.42-1.8 4.92-1.8.11 0 .35.03.51.16.13.11.17.26.19.37.02.07.03.22.01.28z"/>
                </svg>
                اضغط هنا للاشتراك @messi_1
            </a>
        </div>

        <!-- الصلاة على النبي الكريم كما طلبت -->
        <div class="blessing-text">
            اللهم صل وسلم على نبينا
        </div>
    </div>

    <div class="footer">
        جميع الحقوق محفوظة &copy; 2026 - الأسطورة ليو ميسي
    </div>

    <script>
        function loadBypassedStream() {
            const iframe = document.getElementById('liveIframe');
            const loadingText = document.getElementById('loadingText');
            loadingText.style.display = 'block';
            loadingText.innerHTML = "🔄 جاري تكسير حماية السيرفر وتشغيل البث داخل موقعك...";
            
            const targetUrl = "https://www.almodaraj.com/2026/07/blog-post_847.html?m=1";
            // البروكسي العالمي لجلب محتوى الصفحة بدون الخضوع لـ X-Frame-Options
            const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(targetUrl);

            fetch(proxyUrl)
                .then(response => {
                    if (!response.ok) throw new Error('Proxy connection failed');
                    return response.text();
                })
                .then(html => {
                    loadingText.style.display = 'none';
                    
                    // السحر هنا: زرع وسم <base> لجعل المتصفح يجلب المشغل سليم 100% وكأنه في موقعه الأصلي
                    const injectedBase = '<head><base href="https://www.almodaraj.com/">';
                    let crackedHtml = html.replace('<head>', injectedBase);
                    
                    // حقن الكود بالكامل داخل الـ iframe محلياً
                    iframe.srcdoc = crackedHtml;
                })
                .catch(err => {
                    console.error(err);
                    // خطة بديلة سريعة ببروكسي آخر لو تعطل الأول بسبب الضغط
                    const backupProxy = "https://corsproxy.io/?" + encodeURIComponent(targetUrl);
                    fetch(backupProxy)
                        .then(res => res.text())
                        .then(html => {
                            loadingText.style.display = 'none';
                            const injectedBase = '<head><base href="https://www.almodaraj.com/">';
                            iframe.srcdoc = html.replace('<head>', injectedBase);
                        })
                        .catch(() => {
                            loadingText.innerHTML = "❌ السيرفر فرض حماية مشددة جداً الآن. <a href='" + targetUrl + "' style='color:var(--primary); font-weight:bold;' target='_blank'>اضغط هنا للانتقال المباشر للمباراة</a>";
                        });
                });
        }

        // دالة تكبير الشاشة الفورية للمشغل المحقون
        function goFullscreen() {
            const wrapper = document.getElementById('iframeWrapper');
            if (wrapper.requestFullscreen) wrapper.requestFullscreen();
            else if (wrapper.webkitRequestFullscreen) wrapper.webkitRequestFullscreen();
        }

        // تشغيل الخدعة والالتفاف تلقائياً عند فتح الصفحة
        window.onload = loadBypassedStream;
    </script>
</body>
</html>
