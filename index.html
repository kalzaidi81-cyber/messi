<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messi TV | البث الحصري</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Cairo', sans-serif; }
        
        /* الهيدر الاحترافي */
        .navbar { padding: 20px; text-align: center; border-bottom: 1px solid var(--gold); background: linear-gradient(to bottom, #111, #000); }
        .navbar h1 { margin: 0; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }

        /* منطقة الفيديو */
        .video-wrapper { width: 95%; max-width: 900px; margin: 20px auto; border: 2px solid var(--gold); border-radius: 15px; overflow: hidden; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
        
        /* قائمة السيرفرات الأنيقة */
        .server-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; padding: 20px; max-width: 900px; margin: 0 auto; }
        .btn-server { padding: 15px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; cursor: pointer; transition: 0.4s; font-weight: bold; }
        .btn-server:hover { border-color: var(--gold); background: #222; }
        .btn-server.active { background: var(--gold); color: #000; }

        /* تذييل الصفحة */
        .footer { text-align: center; padding: 30px; font-size: 0.9em; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="navbar"><h1>Messi Legend TV</h1></div>

    <div class="video-wrapper" id="player-box">
        <video id="my-video" class="video-js vjs-big-play-centered" playsinline muted controls width="100%" height="450px"></video>
    </div>

    <div class="server-grid">
        <button class="btn-server active" onclick="loadStream('https://am.kooran60.cfd/poole1.m3u8', this)">سيرفر 1 (HD)</button>
        <button class="btn-server" onclick="loadStream('رابط_سيرفر_2', this)">سيرفر 2 (SD)</button>
        <button class="btn-server" onclick="loadStream('رابط_سيرفر_3', this)">سيرفر 3 (Lite)</button>
    </div>

    <div class="footer">جميع الحقوق محفوظة لمحبي الأسطورة 2026</div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var player = videojs('my-video');
        function loadStream(url, btn) {
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
            document.querySelectorAll('.btn-server').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
