<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأسطورة للبث المباشر</title>
    <!-- مكتبة Hls.js لتشغيل البث -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- خط Cairo الاحترافي للمنصات الرياضية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }
        body {
            background-color: #0a0a0c;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        .main-container {
            width: 100%;
            max-width: 850px;
            margin: auto;
        }
        /* الهيدر العلوي وشارة المباشر */
        .stream-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }
        .stream-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffffff;
        }
        .live-badge {
            display: flex;
            align-items: center;
            background: #1f1214;
            color: #ff3b30;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            border: 1px solid #5a1215;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #ff3b30;
            border-radius: 50%;
            margin-left: 8px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }
        /* إطار مشغل الفيديو */
        .player-card {
            background: #121214;
            border: 1px solid #1f1f23;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }
        video {
            width: 100%;
            display: block;
            aspect-ratio: 16/9;
            background: #000;
        }
        /* شريط التحكم السفلي وزر التحديث */
        .control-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background: #16161a;
            border-top: 1px solid #1f1f23;
        }
        .refresh-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #242429;
            color: #ffffff;
            border: 1px solid #323239;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 250px;
        }
        .refresh-btn:hover {
            background: #2d2d35;
            border-color: #4a4a55;
            transform: translateY(-1px);
        }
        .refresh-btn:active {
            transform: translateY(1px);
        }
        .refresh-icon {
            margin-left: 8px;
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
        /* التذييل الاحترافي للقناة */
        .stream-footer {
            text-align: center;
            margin-top: 40px;
            width: 100%;
            padding-top: 20px;
            border-top: 1px solid #16161a;
        }
        .footer-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: #8e8e93;
            margin-bottom: 10px;
        }
        .tg-link {
            display: inline-flex;
            align-items: center;
            color: #0088cc;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: color 0.2s;
        }
        .tg-link:hover {
            color: #24a1de;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- الهيدر -->
        <div class="stream-header">
            <div class="stream-title">بث الأسطورة ليو ميسي المباشر</div>
            <div class="live-badge">
                <div class="live-dot"></div>
                مباشر
            </div>
        </div>

        <!-- المشغل -->
        <div class="player-card">
            <video id="video" controls autoplay playsinline></video>
            
            <!-- شريط زر التحديث الجديد -->
            <div class="control-bar">
                <button class="refresh-btn" onclick="reloadStream()">
                    <svg class="refresh-icon" viewBox="0 0 24 24">
                        <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                    تحديث البث 🔄
                </button>
            </div>
        </div>

        <!-- التذييل المطلوب -->
        <div class="stream-footer">
            <div class="footer-text">قناة الأسطورة ليو ميسي</div>
            <a href="https://t.me/messi_1" target="_blank" class="tg-link">@messi_1</a>
        </div>
    </div>

    <script>
        var video = document.getElementById('video');
        var videoSrc = 'https://sh.kooraa36.cfd/endroom1.m3u8';
        var hls;

        function initStream() {
            if (Hls.isSupported()) {
                if (hls) { hls.destroy(); } // تدمير النسخة القديمة إن وجدت عند التحديث
                hls = new Hls();
                hls.loadSource(videoSrc);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            }
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = videoSrc;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        // دالة زر التحديث الذكي لإعادة الاتصال بالسيرفر فوراً دون الحاجة لتحديث الصفحة كاملة
        function reloadStream() {
            console.log("جاري إعادة تشغيل وتحديث البث...");
            initStream();
        }

        // تشغيل البث تلقائياً عند فتح الصفحة لأول مرة
        initStream();
    </script>
</body>
</html>
