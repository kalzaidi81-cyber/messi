<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث الأسطورة ليو ميسي</title>
    <style>
        /* الأساسيات لملء الشاشة بالكامل */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #fff;
        }

        /* حاوية المحتوى الفخمة */
        .full-screen-container {
            width: 100%;
            padding: 20px;
            text-align: center;
            max-width: 800px;
        }

        .status-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #00d4ff;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
        }

        .message {
            font-size: 1.5rem;
            margin: 10px 0;
            font-weight: 300;
        }

        .prayer {
            color: #888;
            margin-top: 30px;
            font-style: italic;
        }

        /* زر الانضمام الاحترافي */
        .channel-btn {
            display: inline-block;
            margin-top: 50px;
            padding: 20px 40px;
            background: linear-gradient(135deg, #0088cc 0%, #00a8ff 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0, 136, 204, 0.4);
            transition: transform 0.3s ease;
        }

        .channel-btn:hover {
            transform: scale(1.05);
        }

        /* رسالة اليوزر */
        .username {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="full-screen-container">
        <h1 class="status-title">قناة الأسطورة ليو ميسي</h1>
        
        <p class="message">خارج الخدمة حالياً</p>
        <p class="message">سنعود لكم فور انطلاق المباريات</p>

        <p class="prayer">اللهم صلِّ وسلم على نبينا محمد ﷺ</p>

        <a href="https://t.me/messi_1" class="channel-btn">
            ✈️ انضموا للقناة لمتابعة الأخبار
        </a>
        
        <div class="username">@messi_1</div>
    </div>

</body>
</html>
