
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر | إسبانيا ضد البرتغال</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        /* إعدادات الألوان والتصميم الأساسي */
        :root {
            --primary: #e50914; /* لون أحمر احترافي */
            --dark-bg: #0a0a0a;
            --panel-bg: #1a1a1a;
            --text-light: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* تصميم الهيدر (رأس الصفحة) */
        .header {
            background-color: var(--panel-bg);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .header span {
            color: var(--primary);
        }

        /* حاوية مشغل الفيديو */
        .player-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .video-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #333;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* تصميم الأزرار (لوحة التحكم) */
        .controls-panel {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .btn {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background-color: var(--primary);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4);
        }

        /* رسالة حالة البث */
        .status-bar {
            text-align: center;
            margin-top: 20px;
            font-size: 15px;
            color: #aaaaaa;
        }

        /* حقوق النشر */
        .footer {
            text-align: center;
            padding: 20px;
            margin-top: 50px;
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>مباراة <span>إسبانيا</span> ضد <span>البرتغال</span> ⚽</h1>
    </div>

    <div class="player-container">
        <div class="video-wrapper" id="videoWrapper">
            <video id="liveVideo" controls playsinline></video>
        </div>

        <div class="controls-panel">
            <button class="btn" id="refreshBtn">🔄 تحديث البث</button>
            <button class="btn" id="fullscreenBtn">📺 تكبير الشاشة</button>
        </div>

        <div class="status-bar" id="statusMsg">جاري تجهيز البث...</div>
    </div>

    <div class="footer">
        جميع الحقوق محفوظة &copy; 2026 - بث احترافي
    </div>

    <script>
        const video = document.getElementById('liveVideo');
        const videoWrapper = document.getElementById('videoWrapper');
        const statusMsg = document.getElementById('statusMsg');
        
        // الرابط الذي أرسلته
        const streamUrl = "https://table.houseinventer.com/pdf/AzMjD2IyADQPb2tLfQ/index.m3u8";
        let hls;

        // دالة تشغيل البث
        function initPlayer() {
            statusMsg.innerText = "جاري الاتصال بالسيرفر...";
            statusMsg.style.color = "#aaa";

            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy(); // تدمير الاتصال القديم عند التحديث
                }
                hls = new Hls();
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(() => {
                        statusMsg.innerText = "جاهز للعرض. اضغط على زر (Play) داخل الفيديو.";
                    });
                    statusMsg.innerText = "🟢 البث متصل ويعمل بنجاح";
                    statusMsg.style.color = "#4CAF50"; // لون أخضر
                });

                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        statusMsg.innerText = "🔴 انقطع الاتصال بالسيرفر. يرجى الضغط على زر التحديث.";
                        statusMsg.style.color = "#e50914"; // لون أحمر
                    }
                });
            } 
            // للأجهزة التي تدعم البث مباشرة (مثل الآيفون و سفاري)
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                    statusMsg.innerText = "🟢 البث متصل ويعمل بنجاح (وضع Apple)";
                    statusMsg.style.color = "#4CAF50";
                });
            }
        }

        // تشغيل البث فور فتح الصفحة
        initPlayer();

        // برمجة زر "تحديث البث"
        document.getElementById('refreshBtn').addEventListener('click', function() {
            initPlayer();
        });

        // برمجة زر "تكبير الشاشة"
        document.getElementById('fullscreenBtn').addEventListener('click', function() {
            if (videoWrapper.requestFullscreen) {
                videoWrapper.requestFullscreen();
            } else if (videoWrapper.webkitRequestFullscreen) { /* لمتصفحات سفاري القديمة */
                videoWrapper.webkitRequestFullscreen();
            } else if (videoWrapper.msRequestFullscreen) { /* لمتصفح إنترنت إكسبلورر */
                videoWrapper.msRequestFullscreen();
            }
        });
    </script>

</body>
</html>
