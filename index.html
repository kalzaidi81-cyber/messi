<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بث الأسطورة - التغطية المباشرة</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; background-color: #000; font-family: 'Segoe UI', sans-serif; color: gold; display: flex; flex-direction: column; height: 100vh; }
        .header { text-align: center; padding: 15px; border-bottom: 2px solid gold; background: #111; }
        .video-container { position: relative; width: 100%; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        
        /* تصميم السيرفرات */
        .server-list { display: flex; justify-content: center; gap: 10px; padding: 15px; background: #000; }
        .server-btn { 
            padding: 10px 20px; background: #222; border: 1px solid gold; 
            color: gold; cursor: pointer; border-radius: 5px; font-weight: bold; 
        }
        .server-btn:hover, .server-btn.active { background: gold; color: black; }

        #play-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="header"><h1>البث المباشر للأسطورة</h1></div>

    <div class="video-container">
        <div id="play-overlay">
            <button id="start-btn" style="padding: 20px 50px; font-size: 24px; background: gold; border: none; border-radius: 50px; cursor: pointer;">اضغط للبدء</button>
        </div>
        <video id="my-video" class="video-js vjs-big-play-centered" playsinline muted controls width="100%" height="100%"></video>
    </div>

    <div class="server-list">
        <button class="server-btn active" onclick="changeSource('https://am.kooran60.cfd/poole1.m3u8', this)">سيرفر 1</button>
        <button class="server-btn" onclick="changeSource('رابط_سيرفر_2_هنا', this)">سيرفر 2</button>
        <button class="server-btn" onclick="changeSource('رابط_سيرفر_3_هنا', this)">سيرفر 3</button>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var player = videojs('my-video');
        
        function changeSource(url, btn) {
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
            document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        document.getElementById('start-btn').addEventListener('click', function() {
            document.getElementById('play-overlay').style.display = 'none';
            player.play();
        });
    </script>
</body>
</html>
