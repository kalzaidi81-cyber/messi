<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بث الأسطورة ميسي - تجربة</title>
    
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        body { margin: 0; background-color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: gold; font-family: sans-serif; overflow: hidden; }
        .video-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        
        #play-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; cursor: pointer;
        }
        button {
            padding: 20px 40px; font-size: 22px; font-weight: bold;
            background: gold; color: #000; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 15px gold;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- شاشة البدء -->
        <div id="play-overlay">
            <h1>تجربة توافق البث</h1>
            <button id="start-btn">اضغط هنا لتجربة البث</button>
        </div>

        <!-- مشغل الفيديو مع الرابط التجريبي -->
        <video id="my-video" class="video-js vjs-big-play-centered" playsinline muted controls width="100%" height="100%">
            <source src="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <!-- Video.js JS -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var player = videojs('my-video');
        var overlay = document.getElementById('play-overlay');
        var btn = document.getElementById('start-btn');

        btn.addEventListener('click', function() {
            overlay.style.display = 'none';
            player.play();
        });
    </script>
</body>
</html>
