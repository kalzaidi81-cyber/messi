<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل البث</title>
    <!-- استدعاء HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
        #video { width: 100%; max-width: 800px; height: auto; }
        #error-log { position: absolute; top: 10px; color: red; background: rgba(0,0,0,0.8); padding: 10px; }
    </style>
</head>
<body>

    <div id="error-log">جاري التحميل...</div>
    <video id="video" controls playsinline></video>

    <script>
        const video = document.getElementById('video');
        const log = document.getElementById('error-log');
        const videoSrc = "https://stm.linkip.org/live/1956_.m3u8";

        function showError(msg) {
            log.innerText = "خطأ: " + msg;
            console.error(msg);
        }

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                log.style.display = 'none';
                video.play().catch(e => showError("يتطلب تفاعل للتشغيل التلقائي"));
            });

            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    showError("مشكلة في الاتصال بالسيرفر: " + data.type);
                }
            });
        }
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', () => {
                log.style.display = 'none';
                video.play();
            });
        } else {
            showError("متصفحك لا يدعم هذا النوع من البث");
        }
    </script>
</body>
</html>
