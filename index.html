<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحت الصيانة | الأسطورة ليو ميسي</title>
    
    <style>
        :root {
            --primary: #e63946;
            --gold: #f4a261;
            --bg: #09090b;
            --card: #18181b;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            background: var(--card);
            border: 1px solid #27272a;
            padding: 50px 30px;
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 20px;
        }

        p {
            color: #a1a1aa;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .highlight {
            color: var(--gold);
            font-weight: bold;
        }

        .telegram-btn {
            display: inline-block;
            background: #24A1DE;
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s;
        }

        .telegram-btn:hover { transform: scale(1.05); }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🛠️</div>
        <h1>الموقع تحت الصيانة</h1>
        <p>نعمل حالياً على تجهيز أفضل تجربة مشاهدة لكم. <br>
           <span class="highlight">سيعود البث فور اقتراب مباراة الأرجنتين</span>، كونوا في الانتظار!</p>
        
        <a href="https://t.me/messi_1" class="telegram-btn">تابعنا على تليجرام للتنبيهات 👑</a>

        <div class="footer">
            اللهم صل وسلم على نبينا
        </div>
    </div>

</body>
</html>
