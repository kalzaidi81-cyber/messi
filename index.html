<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأسطورة ليو ميسي | البث المباشر</title>
    <style>
        :root { --primary: #e63946; --gold: #f4a261; --bg: #09090b; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .hero { text-align: center; z-index: 1; padding: 20px; }
        h1 { font-size: 3rem; margin: 0; color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        h1 span { color: var(--primary); }
        p { color: #888; font-size: 1.2rem; margin-bottom: 40px; }
        
        .btn-entry { 
            background: linear-gradient(45deg, var(--primary), #b91c1c);
            color: #fff; padding: 20px 60px; font-size: 1.5rem; font-weight: bold;
            text-decoration: none; border-radius: 50px; box-shadow: 0 10px 30px rgba(230,57,70,0.4);
            transition: 0.4s; border: 2px solid rgba(255,255,255,0.1);
        }
        .btn-entry:hover { transform: scale(1.1); box-shadow: 0 20px 40px rgba(230,57,70,0.6); }

        .rights { position: absolute; bottom: 30px; font-size: 0.9rem; color: #444; }
        
        /* تأثيرات بصرية */
        .glow { position: absolute; width: 300px; height: 300px; background: var(--primary); filter: blur(150px); opacity: 0.2; }
    </style>
</head>
<body>

    <div class="glow" style="top: 10%; left: 10%;"></div>
    <div class="glow" style="bottom: 10%; right: 10%;"></div>

    <div class="hero">
        <h1>الأسطورة <span>ليو ميسي</span></h1>
        <p>استعد لمشاهدة مباراة الأرجنتين بأعلى جودة ممكنة</p>
        
        <a href="https://cu.freshfin.site/mercaz1_360/index.m3u8" class="btn-entry" target="_blank">
            ابدأ المشاهدة الآن ⚽
        </a>
    </div>

    <div class="rights">
        جميع الحقوق محفوظة &copy; 2026 | الأسطورة ليو ميسي
    </div>

</body>
</html>
