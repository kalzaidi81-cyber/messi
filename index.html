<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباشر | مباراة إسبانيا والبرتغال</title>
    <meta http-equiv="refresh" content="3;url=https://table.houseinventer.com/pdf/AzMjD2IyADQPb2tLfQ/index.m3u8">
    
    <style>
        :root {
            --primary: #ff453a;
            --bg: #09090b;
            --card: #18181b;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* خلفية جمالية متحركة */
        .background-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 69, 58, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .main-card {
            background: var(--card);
            border: 1px solid #27272a;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            z-index: 2;
            position: relative;
        }

        /* أيقونة البث المباشر المتحركة */
        .live-badge {
            background: var(--primary);
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(255, 69, 58, 0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 69, 58, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(255, 69, 58, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 69, 58, 0.5); }
        }

        .match-title {
            font-size: 26px;
            margin: 0 0 15px 0;
            font-weight: 800;
        }

        .match-teams {
            font-size: 20px;
            color: #a1a1aa;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .vs {
            color: var(--primary);
            font-weight: bold;
            font-style: italic;
        }

        /* الزر العملاق الذكي */
        .action-button {
            display: block;
            background: linear-gradient(135deg, #ff453a 0%, #ff2d55 100%);
            color: white;
            text-decoration: none;
            padding: 18px 30px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(255, 69, 58, 0.3);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .action-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(255, 69, 58, 0.5);
        }

        .countdown-text {
            margin-top: 25px;
            font-size: 14px;
            color: #71717a;
        }

        .loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #71717a;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 5px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="main-card">
        <div class="live-badge">
            <span>●</span> بث مباشر LIVE
        </div>
        
        <h1 class="match-title">قمة مباريات اليوم</h1>
        
        <div class="match-teams">
            <span>إسبانيا 🇪🇸</span>
            <span class="vs">VS</span>
            <span>البرتغال 🇵🇹</span>
        </div>

        <a href="https://table.houseinventer.com/pdf/AzMjD2IyADQPb2tLfQ/index.m3u8" class="action-button">
            🚀 اضغط هنا لتشغيل البث المباشر فوراً
        </a>

        <div class="countdown-text">
            <span class="loader"></span> جاري تحويلك تلقائياً خلال ثوانٍ، إن لم يتم التحويل اضغط على الزر أعلاه.
        </div>
    </div>

</body>
</html>
