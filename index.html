<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بث الأسطورة ليو ميسي المباشر</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body {
            background-color: #05070a;
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 136, 204, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.12), transparent 25%);
        }

        /* الحاوية الزجاجية الفخمة */
        .premium-container {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.15);
        }

        /* الهيدر */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .title-wrapper h1 {
            font-size: 1.5rem;
            font-weight: 900;
            margin: 0 0 5px 0;
            background: linear-gradient(135deg, #ffffff, #b3b3b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-wrapper p {
            margin: 0;
            font-size: 0.95rem;
            color: #888;
        }

        /* مؤشر البث المباشر */
        .live-badge {
            display: flex;
            align-items: center;
            background: rgba(255, 59, 48, 0.12);
            border: 1px solid rgba(255, 59, 48, 0.3);
            color: #ff453a;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 700;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: #ff453a;
            border-radius: 50%;
            margin-left: 10px;
            box-shadow: 0 0 12px #ff453a;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 69, 58, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(255, 69, 58, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 69, 58, 0); }
        }

        /* حاوية مشغل الفيديو */
        .video-wrapper {
            width: 100%;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            aspect-ratio: 16 / 9; 
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            outline: none;
        }

        /* منطقة الأزرار والدعم */
        .action-zone {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
            align-items: center;
        }

        /* زر التشغيل الخارجي (الذهبي) لتخطي حظر السيرفرات */
        .external-play-btn {
            background: linear-gradient(135deg, #d4af37 0%, #aa841c 100%);
            color: #000;
            border: none;
            padding: 16px 30px;
            border-radius: 50px;
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            max-width: 480px;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
        }

        .external-play-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(212, 175, 55, 0.5);
        }

        .notice-text {
            font-size: 0.85rem;
            color: #999;
            text-align: center;
            margin: 0 15px;
            line-height: 1.5;
        }

        /* الفوتر وزر التليجرام */
        .footer {
            margin-top: 30px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 25px;
        }

        .tg-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2AABEE 0%, #229ED9 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 14px 35px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(42, 171, 238, 0.25);
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
        }

        .tg-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(42, 171, 238, 0.4);
        }

        .tg-btn svg {
            width: 24px;
            height: 24px;
            fill: #ffffff;
            margin-left: 10px;
        }

        .username {
            display: block;
            margin-top: 12px;
            color: #666;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="premium-container">
        
        <div class="header">
            <div class="title-wrapper">
                <h1>بث الأسطورة ليو ميسي</h1>
                <p>تغطية حصرية للمباريات 🐐</p>
            </div>
            <div class="live-badge">
                <div class="pulse-dot"></div>
                <span>مباشر الآن</span>
            </div>
        </div>

        <div class="video-wrapper">
            <video id="videoPlayer" controls autoplay playsinline webkit-playsinline></video>
        </div>

        <div class="action-zone">
            <a href="https://stm.linkip.org/live/1957_.m3u8" class="external-play-btn" target="_blank">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
                اضغط هنا للتشغيل المباشر (شاشة كاملة + صوت)
            </a>
            
            <p class="notice-text">💡 ملاحظة: إذا ظهرت شاشة سوداء بسبب قيود تطبيق تليجرام، فقط اضغط على الزر الذهبي بالأعلى وسيفتح البث فوراً في مشغل هاتفك بأعلى جودة.</p>
        </div>

        <div class="footer">
            <a href="https://t.me/messi_1" target="_blank" class="tg-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .24z"/>
                </svg>
                انضم لقناتنا في تيليجرام
            </a>
            <span class="username">@messi_1</span>
        </div>

    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        // تم دمج الرابط الجديد هنا مباشرة
        const videoSrc = 'https://stm.linkip.org/live/1957_.m3u8';
        let hls;

        function startStream() {
            if (Hls.isSupported()) {
                if (hls) { hls.destroy(); }
                hls = new Hls({
                    maxBufferLength: 10,
                    liveSyncDuration: 3, // لتقليل التأخير لـ 30 ثانية أو أقل
                    enableWorker: true
                });
                hls.loadSource(videoSrc);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(() => {
                        console.log("Auto-play prevented by browser policy.");
                    });
                });
            }
            // دعم متصفح سفاري (أجهزة آيفون) بشكل مباشر
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = videoSrc;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        window.onload = startStream;
    </script>
</body>
</html>
