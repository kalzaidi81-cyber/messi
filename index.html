
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بث قناة الأسطورة ليو ميسي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.5.2/video-js.css" rel="stylesheet" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            background-color: #05070a;
            color: #ffffff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 10%, rgba(116, 172, 223, 0.1), transparent 30%),
                radial-gradient(circle at 85% 90%, rgba(212, 175, 55, 0.05), transparent 30%);
            transition: background 0.3s ease;
        }

        .premium-container {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .title-wrapper h1 {
            font-size: 1.3rem;
            font-weight: 900;
            margin: 0 0 5px 0;
            background: linear-gradient(135deg, #74acdf, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .title-wrapper p {
            margin: 0;
            font-size: 0.85rem;
            color: #888;
        }

        .live-badge {
            display: flex;
            align-items: center;
            background: rgba(255, 59, 48, 0.15);
            border: 1px solid rgba(255, 59, 48, 0.4);
            color: #ff453a;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 900;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background: #ff453a;
            border-radius: 50%;
            margin-left: 6px;
            box-shadow: 0 0 8px #ff453a;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            100% { transform: scale(1.3); opacity: 1; }
        }

        /* حاوية الفيديو الأساسية */
        .video-wrapper {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #000;
            transition: all 0.3s ease;
        }

        /* تنسيق الفيديو */
        .video-js {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 16/9;
        }

        .vjs-big-play-button {
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            border-radius: 50% !important;
            background-color: rgba(116, 172, 223, 0.8) !important;
            border: none !important;
            width: 3em !important;
            height: 3em !important;
            line-height: 3em !important;
        }

        /* ========================================= */
        /* الحل الجذري لتكبير الشاشة (CSS Full-Window) */
        /* ========================================= */
        .css-fullscreen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100% !important;
            z-index: 999999 !important;
            border-radius: 0 !important;
            border: none !important;
            background-color: #000 !important;
            margin: 0 !important;
            padding: 0 !important;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .css-fullscreen .video-js {
            padding-top: 0 !important; 
            height: 100% !important;
        }
        
        .css-fullscreen video {
            object-fit: contain !important;
        }
        /* ========================================= */

        /* بنر الحقوق الجديد المطور (قابل للضغط) */
        .rights-banner {
            display: block;
            background: linear-gradient(90deg, rgba(116, 172, 223, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 1px solid rgba(116, 172, 223, 0.3);
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
            font-weight: 900;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .rights-banner:hover {
            background: linear-gradient(90deg, rgba(116, 172, 223, 0.2) 0%, rgba(255, 255, 255, 0.1) 100%);
            transform: translateY(-2px);
            border-color: rgba(116, 172, 223, 0.6);
        }

        .rights-banner span {
            color: #74acdf;
            font-weight: 700;
        }

        /* الفوتر وزر التليجرام */
        .footer {
            margin-top: 20px;
            text-align: center;
            width: 100%;
        }

        .tg-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2AABEE 0%, #229ED9 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 14px 35px;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 900;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 350px;
            box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(42, 171, 238, 0.25);
        }

        .tg-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(42, 171, 238, 0.4);
        }

        .tg-btn svg {
            width: 22px;
            height: 22px;
            fill: #ffffff;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <div class="premium-container">
        
        <!-- الهيدر -->
        <div class="header">
            <div class="title-wrapper">
                <h1>تغطية الأسطورة ميسي</h1>
                <p>الأرجنتين 🇦🇷 ضد الرأس الأخضر 🇨🇻</p>
            </div>
            <div class="live-badge">
                <div class="pulse-dot"></div>
                <span>مباشر</span>
            </div>
        </div>

        <!-- حاوية الفيديو -->
        <div class="video-wrapper" id="videoContainer">
            <!-- مشغل Video.js الاحترافي -->
            <video
                id="my-video"
                class="video-js vjs-default-skin vjs-big-play-centered"
                controls
                preload="auto"
                playsinline
                webkit-playsinline
                data-setup='{"fluid": true, "controlBar": {"fullscreenToggle": true}}'>
                <source src="https://stm.linkip.org/live/1957_.m3u8" type="application/x-mpegURL">
            </video>
        </div>

        <!-- بنر الحقوق الجديد تحت الفيديو (رابط مباشر للقناة) -->
        <a href="https://t.me/messi_1" target="_blank" class="rights-banner">
            👑 بث قناة الأسطورة ليو ميسي | <span>انضم للقناة من هنا</span>
        </a>

        <!-- الفوتر -->
        <div class="footer">
            <a href="https://t.me/messi_1" target="_blank" class="tg-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .24z"/>
                </svg>
                تغطية حصرية @messi_1
            </a>
        </div>

    </div>

    <!-- استدعاء سكريبت المشغل -->
    <script src="https://vjs.zencdn.net/8.5.2/video.min.js"></script>
    
    <script>
        // توسيع شاشة التليجرام لأقصى حد ممكن
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.expand();
        }

        // تهيئة المشغل
        var player = videojs('my-video', {
            html5: { vhs: { overrideNative: true } }
        });

        // هندسة عكسية لزر التكبير عشان يشتغل غصب داخل التليجرام
        player.ready(function() {
            var myPlayer = this;
            var controlBar = myPlayer.controlBar;
            var fsButton = controlBar.getChild('fullscreenToggle');

            if (fsButton) {
                // إيقاف الأمر الافتراضي للمتصفح
                fsButton.off('tap');
                fsButton.off('click');

                // تطبيق التكبير الجذري عبر الـ CSS
                var toggleCustomFullscreen = function() {
                    var container = document.getElementById('videoContainer');
                    container.classList.toggle('css-fullscreen');
                    
                    if (container.classList.contains('css-fullscreen')) {
                        document.body.style.overflow = 'hidden'; // إخفاء التمرير
                        if (window.Telegram && window.Telegram.WebApp) {
                            window.Telegram.WebApp.expand();
                        }
                    } else {
                        document.body.style.overflow = ''; // إعادة التمرير
                    }
                };

                // ربط الزر بالوظيفة الجديدة
                fsButton.on('tap', toggleCustomFullscreen);
                fsButton.on('click', toggleCustomFullscreen);
            }
        });
    </script>
</body>
</html>
