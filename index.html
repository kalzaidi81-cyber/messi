<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بث الأسطورة ميسي</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        body { margin: 0; background-color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: gold; font-family: sans-serif; overflow: hidden; }
        .video-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        
        /* شاشة التفعيل الفخمة */
        #play-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #000, #332600);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; cursor: pointer; border: 2px solid gold;
        }
        button {
            padding: 20px 40px; font-size: 22px; font-weight: bold;
            background: gold; color: #000; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 20px gold; transition: 0.3s;
        }
        button:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="video-container">
        <div id="play-overlay">
            <h1 style="margin-bottom: 20px;">بث الأسطورة مباشر</h1>
            <button id="start-btn">بدء المشاهدة الآن</button>
        </div>

        <video id="my-video" class="video-js vjs-big-play-centered" playsinline muted controls width="100%" height="100%">
            <source src="https://am.kooran60.cfd/poole1.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var player = videojs('my-video');
        var overlay = document.getElementById('play-overlay');
        var btn = document.getElementById('start-btn');

        btn.addEventListener('click', function() {
            overlay.style.display = 'none';
            player.play();
        });
    </script>
</body>
</html>
