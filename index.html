<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وضع الاستعداد | قناة الأسطورة ليو ميسي</title>
    
    <style>
        :root {
            --primary: #ff453a;
            --gold: #ffd700;
            --telegram: #24A1DE;
            --bg: #09090b;
            --card: #18181b;
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .background-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 69, 58, 0.08) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .main-card {
            background: var(--card);
            border: 1px solid #27272a;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 550px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            z-index: 2;
            position: relative;
        }

        /* شارة الاستعداد المتحركة */
        .standby-badge {
            background: rgba(255, 69, 58, 0.1);
            color: var(--primary);
            border: 1px solid rgba(255, 69, 58, 0.3);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background-color: var(--primary);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 0.3; }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.3; }
        }

        .title {
            font-size: 26px;
            font-weight: 800;
            margin: 0 0 15px 0;
            line-height: 1.4;
        }

        .sub-title {
            font-size: 16px;
            color: #a1a1aa;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .match-highlight {
            color: var(--gold);
            font-weight: bold;
        }

        /* قسم تليجرام */
        .telegram-section {
            background: #111113;
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .channel-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--text);
            margin-bottom: 12px;
        }

        .telegram-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background-color: var(--telegram);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(36, 161, 222, 0.3);
        }

        .telegram-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(36, 161, 222, 0.5);
        }

        .telegram-icon {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* الصلاة على النبي والذيل */
        .blessing-text {
            font-size: 16px;
            color: #d4d4d8;
            margin-top: 25px;
            font-weight: 500;
            border-top: 1px solid #27272a;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="main-card">
        <!-- شارة وضع الاستعداد -->
        <div class="standby-badge">
            <div class="pulse-dot"></div>
            <span>الموقع في وضع الاستعداد</span>
        </div>
        
        <!-- نص الانتظار للمباراة -->
        <h2 class="title">انتظرونا وقت الماتش! ⚽</h2>
        <p class="sub-title">
            سيتم تفعيل البث المباشر للقاء <span class="match-highlight">إسبانيا ضد البرتغال</span> فور انطلاق صافرة المباراة مباشرة.
        </p>

        <!-- صندوق قناة التليجرام -->
        <div class="telegram-section">
            <div class="channel-name">قناة الأسطورة ليو ميسي مخصصة لكم دائماً 👑</div>
            <a href="https://t.me/messi_1" class="telegram-btn" target="_blank">
                <!-- شعار تليجرام SVG نظيف وسريع -->
                <svg class="telegram-icon" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-1-.65-.35-1 .22-1.62.15-.15 2.7-2.46 2.75-2.67.01-.03.01-.14-.06-.2-.07-.06-.17-.04-.25-.02-.11.02-1.83 1.16-5.17 3.42-.49.34-.93.5-1.33.49-.44-.01-1.29-.25-1.92-.45-.77-.25-1.39-.39-1.34-.83.03-.23.35-.46.97-.71 3.82-1.66 6.37-2.75 7.66-3.29 3.66-1.53 4.42-1.8 4.92-1.8.11 0 .35.03.51.16.13.11.17.26.19.37.02.07.03.22.01.28z"/>
                </svg>
                اضغط هنا للاشتراك @messi_1
            </a>
        </div>

        <!-- الصلاة على النبي الكريم -->
        <div class="blessing-text">
            اللهم صل وسلم على نبينا
        </div>
    </div>

</body>
</html>
