<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث ميسي الرسمي | LM10</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; }
        body { background: #0a0a0a; color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding-bottom: 30px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #111; border-bottom: 1px solid #333; }
        .refresh-btn { cursor: pointer; color: var(--gold); font-size: 20px; transition: 0.3s; }
        .refresh-btn:hover { transform: rotate(180deg); }

        .video-container { width: 100%; background: #000; position: relative; }
        
        .content { padding: 20px; }
        .section-title { font-weight: 700; margin: 15px 0; display: flex; align-items: center; gap: 10px; color: var(--gold); }

        .channel-card { background: #161616; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .channel-card:hover { border-color: var(--gold); background: #1f1f1f; }

        .stats-box { 
            background: linear-gradient(135deg, #1a1a1a, #000);
            border: 1px solid var(--gold);
            padding: 20px;
            border-radius: 20px;
            margin-top: 25px;
            text-align: center;
        }
        
        .footer-text { text-align: center; margin-top: 20px; color: var(--gold); font-weight: 700; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:900;">LM10 <span>LIVE</span></div>
        <div class="refresh-btn" onclick="location.reload()">🔄</div>
    </div>

    <div class="video-container">
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" width="100%" height="240">
            <source src="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <div class="content">
        <div class="section-title">⚽ سيرفرات المشاهدة</div>
        
        <div class="channel-card" onclick="changeChannel('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', this)">
            سيرفر 1
        </div>
        <div class="channel-card" onclick="changeChannel('https://amg01183-amg0118301-samsungus-1638.chapi.cineverse.com/hls/amg01183-amg0118301-samsungus-1638/master.m3u8', this)">
            سيرفر 2
        </div>

        <div class="stats-box">
            <div style="font-weight: 900; font-size: 18px;">سجل الماعز 🐐</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                <div style="background:#111; padding:10px; border-radius:8px;"><div style="color:var(--gold); font-weight:900;">8</div><div>كرة ذهبية</div></div>
                <div style="background:#111; padding:10px; border-radius:8px;"><div style="color:var(--gold); font-weight:900;">1000+</div><div>مساهمة</div></div>
            </div>
        </div>

        <div class="footer-text">اللهم صلِّ وسلم على نبينا محمد ﷺ</div>
    </div>

    <script>
        window.Telegram.WebApp.ready();
        var player = videojs('my-video');
        function changeChannel(url, el) {
            player.src({type: 'application/x-mpegURL', src: url});
            player.play();
        }
    </script>
</body>
</html>
