<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تغطية البث</title>
    <style>
        body { margin: 0; background: #05070a; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .video-container { width: 100%; max-width: 900px; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    
    <div class="video-container" id="twitch-embed"></div>

    <script src="https://embed.twitch.tv/embed/v1.js"></script>
    <script>
        new Twitch.Embed("twitch-embed", {
            width: "100%",
            height: "100%",
            channel: "اسم_القناة_هنا", /* 👈 ضع هنا اسم القناة الأصلية التي تبث في تويتش */
            layout: "video",
            autoplay: true,
            // parent: ["yourwebsite.com"] /* أزل علامتي السلاش وضع رابط موقعك إذا رفعته على سيرفر */
        });
    </script>
</body>
</html>
