<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البث المباشر - الأسطورة</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        .container { width: 100%; max-width: 800px; text-align: center; }
        video { width: 100%; border-radius: 8px; background: black; }
    </style>
</head>
<body>

    <div class="container">
        <video id="video" controls autoplay playsinline></video>
        <p style="margin-top: 15px;">مشاهدة ممتعة لمباريات الأرجنتين! 🇦🇷</p>
    </div>

    <script>
        var video = document.getElementById('video');
        var videoSrc = 'https://sh.kooraa36.cfd/endroom1.m3u8';
        
        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        }
        else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', function() {
                video.play();
            });
        }
    </script>
</body>
</html>
