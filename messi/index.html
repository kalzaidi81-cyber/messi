<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأسطورة ليو ميسي</title>
    <!-- استدعاء خط Cairo الفخم -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- مكتبة HLS لتشغيل البث -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        /* =========================================
           1. إعدادات الشاشة والخلفية المتحركة (CSS)
           ========================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* تأثيرات الإضاءة السينمائية في الخلفية */
        .bg-glow {
            position: fixed;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0, 136, 204, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -20%;
            right: -20%;
            border-radius: 50%;
            z-index: 0;
            animation: pulse-glow 8s infinite alternate ease-in-out;
        }
        
        .bg-glow-gold {
            position: fixed;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: -10%;
            left: -10%;
            border-radius: 50%;
            z-index: 0;
            animation: pulse-glow 6s infinite alternate-reverse ease-in-out;
        }

        @keyframes pulse-glow {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* =========================================
           2. الحاوية الزجاجية الرئيسية للموقع
           ========================================= */
        .main-container {
            position: relative;
            z-index: 1;
            width: 95%;
            max-width: 900px;
            background: rgba(20, 25, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            margin: 20px 0;
        }

        /* الهيدر (العنوان وحالة البث) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .site-title {
            font-size: 1.5rem;
            font-weight: 900;
            background: linear-gradient(to left, #fff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            background: rgba(255, 59, 48, 0.2);
            border: 1px solid rgba(255, 59, 48, 0.5);
            color: #ff3b30;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .dot {
            width: 10px;
            height: 10px;
            background-color: #ff3b30;
            border-radius: 50%;
            margin-left: 8px;
            box-shadow: 0 0 8px #ff3b30;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* =========================================
           3. مشغل الفيديو وأزرار التحكم
           ========================================= */
        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        video {
            width: 100%;
            display: block;
            outline: none;
        }

        .controls-section {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        /* =========================================
           4. الفوتر (روابط تيليجرام)
           ========================================= */
        .footer {
            margin-top: 30px;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-msg {
            color: #a0a0a0;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .tg-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2AABEE 0%, #229ED9 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(42, 171, 238, 0.3);
            gap: 10px;
        }

        .tg-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(42, 171, 238, 0.5);
        }

        .tg-icon {
            width: 22px;
            height: 22px;
            fill: #ffffff;
        }
    </style>
</head>
<body>

    <!-- مؤثرات الخلفية السينمائية -->
    <div class="bg-glow"></div>
    <div class="bg-glow-gold"></div>

    <!-- حاوية الموقع الرئيسية -->
    <div class="main-container">
        
        <!-- الهيدر -->
        <div class="header">
            <div class="site-title">بث الأسطورة ليو ميسي</div>
            <div class="live-indicator" id="statusBadge">
                <div class="dot"></div>
                <span id="statusText">مباشر</span>
            </div>
        </div>

        <!-- مشغل الفيديو -->
        <div class="video-wrapper">
            <!-- خاصية playsinline ضرورية جداً لعمل الشاشة الكاملة في الجوال -->
            <video id="videoPlayer" controls autoplay playsinline webkit-playsinline></video>
        </div>

        <!-- أدوات التحكم -->
        <div class="controls-section">
            <button class="refresh-btn" onclick="reloadStream()">
                <span>تحديث السيرفر</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
            </button>
        </div>

        <!-- الفوتر ورابط القناة -->
        <div class="footer">
            <p class="footer-msg">تغطية حصرية لكل ما يخص بطل العالم، سنعود لكم فور انطلاق المباريات.</p>
            <a href="https://t.me/messi_1" target="_blank" class="tg-link">
                <svg class="tg-icon" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 00-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .24z"/>
                </svg>
                انضم لقناتكم @messi_1
            </a>
        </div>

    </div>

    <!-- =========================================
         5. السكربتات (JavaScript) لتشغيل البث
         ========================================= -->
    <script>
        const video = document.getElementById('videoPlayer');
        const videoSrc = 'https://sh.kooraa36.cfd/endroom1.m3u8'; // ضع رابط البث الخاص بك هنا
        let hls;

        // دالة تشغيل البث
        function initStream() {
            if (Hls.isSupported()) {
                if (hls) { hls.destroy(); } // تنظيف المشغل القديم قبل التحديث
                hls = new Hls();
                hls.loadSource(videoSrc);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(error => console.log("التشغيل التلقائي يحتاج لتفاعل المستخدم أولاً"));
                });
                
                // التعامل مع الأخطاء (إذا البث متوقف)
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        document.getElementById('statusText').innerText = "البث متوقف";
                        document.querySelector('.live-indicator').style.background = "rgba(160, 160, 160, 0.2)";
                        document.querySelector('.live-indicator').style.borderColor = "rgba(160, 160, 160, 0.5)";
                        document.querySelector('.dot').style.background = "#a0a0a0";
                        document.querySelector('.dot').style.boxShadow = "none";
                        document.querySelector('.dot').style.animation = "none";
                    }
                });
            }
            // لأجهزة الآيفون (تدعم الصيغة مباشرة بدون مكتبة)
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = videoSrc;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        // دالة زر التحديث
        function reloadStream() {
            // تأثير بصري للزر عند الضغط
            const btn = document.querySelector('.refresh-btn svg');
            btn.style.transform = "rotate(360deg)";
            btn.style.transition = "transform 0.5s ease";
            
            setTimeout(() => { btn.style.transform = "rotate(0deg)"; }, 500);
            
            // إعادة تشغيل البث
            initStream();
            
            // إعادة تعيين مؤشر الحالة
            document.getElementById('statusText').innerText = "مباشر";
            document.querySelector('.live-indicator').style.background = "rgba(255, 59, 48, 0.2)";
            document.querySelector('.live-indicator').style.borderColor = "rgba(255, 59, 48, 0.5)";
            document.querySelector('.dot').style.background = "#ff3b30";
            document.querySelector('.dot').style.boxShadow = "0 0 8px #ff3b30";
            document.querySelector('.dot').style.animation = "blink 1s infinite";
        }

        // تشغيل البث تلقائياً عند فتح الصفحة
        window.onload = initStream;
    </script>
</body>
</html>
