<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث الأسطورة ليو ميسي</title>
    <!-- مكتبة HLS للتشغيل -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 10px;
        }

        .main-container {
            width: 100%;
            max-width: 800px;
        }

        .stream-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #16161a;
            border-radius: 10px 10px 0 0;
        }

        .stream-title { font-weight: bold; font-size: 1.2rem; }

        .live-badge {
            display: flex;
            align-items: center;
            background: #ff3b30;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .live-dot { width: 8px; height: 8px; background: white; border-radius: 50%; margin-left: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .player-card {
            background: #000;
            padding: 5px;
            border-bottom: 2px solid #16161a;
        }

        video { width: 100%; height: auto; display: block; background: #000; }

        .control-bar {
            padding: 15px;
            background: #16161a;
            text-align: center;
        }

        .refresh-btn {
            background: #0088cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
        }

        .refresh-icon { width: 20px; height: 20px; fill: white; margin-left: 8px; }

        .stream-footer {
            background: #16161a;
            padding: 20px;
            border-radius: 0 0 10px 10px;
            text-align: center;
        }

        .footer-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: #8e8e93;
            margin-bottom: 10px;
        }

        .tg-link {
            display: inline-flex;
            align-items: center;
            color: #0088cc;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: color 0.2s;
        }
        .tg-link:hover { color: #24a1de; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="stream-header">
            <div class="stream-title">بث الأسطورة ليو ميسي المباشر</div>
            <div class="live-badge">
                <div class="live-dot"></div>
                مباشر
            </div>
        </div>

        <div class="player-card">
            <!-- تمت إضافة playsinline لتفعيل التكبير التلقائي على أجهزة الموبايل -->
            <video id="video" controls autoplay playsinline webkit-playsinline></video>
            
            <div class="control-bar">
                <button class="refresh-btn" onclick="reloadStream()">
                    <svg class="refresh-icon" viewBox="0 0 24 24">
                        <path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                    </svg>
                    تحديث البث 🔄
                </button>
            </div>
        </div>

        <div class="stream-footer">
            <div class="footer-text">قناة الأسطورة ليو ميسي</div>
            <a href="https://t.me/messi_1" target="_blank" class="tg-link">@messi_1</a>
        </div>
    </div>

    <script>
        var video = document.getElementById('video');
        var videoSrc = 'https://sh.kooraa36.cfd/endroom1.m3u8';
        var hls;

        function initStream() {
            if (Hls.isSupported()) {
                if (hls) { hls.destroy(); }
                hls = new Hls();
                hls.loadSource(videoSrc);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            }
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = videoSrc;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
        }

        function reloadStream() {
            initStream();
        }

        initStream();
    </script>
</body>
</html>
